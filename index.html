<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="CSS/main.css">
        <link rel="stylesheet" href="CSS/events.css">
        <link rel="stylesheet" href="CSS/sidebar.css">
        <link rel="stylesheet" href="CSS/tracker.css">
        <link rel="stylesheet" href="CSS/task.css">
        <link rel="stylesheet" href="CSS/main-display.css">
    </head>
    <body>
    <header class="header">
        <div class="header-left">
            <div class="header-title">Flow Dash</div>
            <div class="header-subtitle">Hello, <span id="name">Brian</span></div>
        </div>
    </header>

    <div class="main">
        <aside class="sidebar">
            <div class="nav-app">
                <img src="image/home.svg" alt="Home">
            </div>
            <div class="nav-app">
                <img src="image/calendar.svg" alt="Calendar">
            </div>
            <div class="nav-app">
                <img src="image/achievements.svg" alt="Achievement">
            </div>

            <div class="setting-app">
                <img src="image/setting.svg" alt="Setting">
            </div>
        </aside>

        <div class="divider"></div>

        <main class="dashboard">
            <div id="column1">
                <div class="top" id="main-display">
                    <div class="main-display-box" id="mode">
                        <div class="mode-label">Mode:</div>
                        <div class="current-mode">Break</div>
                    </div>
                    <div class="main-display-box" id="timer">
                        <div class="timer-display">
                            <div class="timer-circle-outer"></div>
                            <div class="timer-circle-inner"></div>
                            <div class="timer-text">0:00</div>
                        </div>
                        <div class="timer-controls">
                            <button class="timer-btn" style="transform: rotate(180deg);">
                                <img src="image/play.svg" alt="Play">
                            </button>
                            <button class="timer-btn">
                                <img src="image/stop.svg" alt="Stop">
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="box bottom" id="task">
                    <div class="box-label">Task</div>
                </div>
            </div>

            <div id="column2">
                <div class="box top" id="tracker">
                    
                    <img class="animation" src="image/freak_relax.png" alt="relax">
                    <div class="progress-bar">
                        <div class="progression-bar"></div>
                    </div>
                </div>
                <div class="box bottom" id="events">
                    <div class="box-label">Events</div>

                    <div class="events-content">
                        <div class="events-add-btn">
                            <img src="image/add.svg" alt="Add Event">
                        </div>

                        <div class="event-card event-card-urgent">
                            <div class="event-card-type">Upcoming • AI</div>
                            <div class="event-card-title">Meeting with Mike for Project Updates</div>
                            <div class="event-card-time urgent-text">Right Now! 🔔</div>
                        </div>

                        <div class="event-card">
                            <div class="event-card-type">Upcoming</div>
                            <div class="event-card-title">Call with Design Team</div>
                            <div class="event-card-time">3:00 pm 🔔</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
