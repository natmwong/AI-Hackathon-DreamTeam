<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Assistant</title>
    <link rel="stylesheet" href="CSS/main.css">
</head>
<body>
    <div class="sidebar">sidebar</div>

    <div class="dashboard">
        <div id="column1">
            <div class="box top" id="clock">
                <h3>Clock</h3>
                <button id="clockInBtn">Clock In</button>
                <button id="clockOutBtn">Clock Out</button>
            </div>

            <div class="box bottom" id="task">
                <h3>Tasks / Input</h3>
                <input id="messageInput" type="text" placeholder="Type a goal, event, or reflection">
                <button id="sendBtn">Send</button>
                <div id="taskList"></div>
            </div>
        </div>

        <div id="column2">
            <div class="box top" id="calendar">
                <h3>Events</h3>
                <div id="eventList"></div>
            </div>

            <div class="box bottom" id="remind">
                <h3>Assistant</h3>
                <div id="responseBox">Backend responses will show here.</div>
            </div>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
