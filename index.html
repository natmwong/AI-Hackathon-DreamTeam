<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="CSS/main.css">
        <link rel="stylesheet" href="CSS/events.css">
        <link rel="stylesheet" href="CSS/sidebar.css">
        <link rel="stylesheet" href="CSS/tracker.css">
        <link rel="stylesheet" href="CSS/task.css">
        <link rel="stylesheet" href="CSS/task-modal.css">
        <link rel="stylesheet" href="CSS/main-display.css">
        <link rel="stylesheet" href="CSS/breathe-modal.css">
        <script src="scripts/timer.js"></script>
        <script src="scripts/event.js"></script>
        <script src="scripts/task.js"></script>
        <script src="scripts/breathe.js"></script>
        <script src="scripts/task.js"></script>
        <script src="scripts/freakAnimation.js"></script>
    </head>
    <body ondragstart="return false;" ondrop="return false;">
    <header class="header">
        <div class="header-left">
            <div class="header-title">Flow Dash</div>
            <div class="header-subtitle">Hello, <span id="name">Brian</span></div>
        </div>
    </header>

    <div class="main">
        <aside class="sidebar">
            <div class="nav-app">
                <img src="image/home.svg" alt="Home">
            </div>
            <div class="nav-app">
                <img src="image/calendar.svg" alt="Calendar">
            </div>
            <div class="nav-app">
                <img src="image/target.svg" alt="Breathe">
            </div>
            <div class="setting-app">
                <img src="image/setting.svg" alt="Setting">
            </div>
        </aside>

        <div class="divider"></div>

        <main class="dashboard">
            <div id="column1">
                <div class="top" id="main-display">
                    <div class="main-display-box default-mode-color" id="mode">
                        <div class="mode-label">Mode:</div>
                        <div class="current-mode">Break</div>
                    </div>
                    <div class="main-display-box" id="timer">
                        <div class="timer-loop-count" id="timer-loop-count">#1</div>
                        <div class="timer-display">
                            <canvas id="timer-canvas" width="220" height="220" style="position:absolute;left:0;top:0;z-index:2;"></canvas>
                            <div class="timer-text" id="timer-text">0:00</div>
                        </div>
                            <div class="timer-controls">
                                <button class="timer-btn" id="timer-playpause">
                                    <img id="timer-playpause-icon" src="image/play.svg" alt="Play">
                                </button>
                                <button class="timer-btn" id="timer-restart">
                                    <img id="timer-restart-icon" src="image/stop.svg" alt="Stop">
                                </button>
                        </div>
                    </div>
                </div>
                
                <div class="box bottom" id="task">
                    <div class="task-header">
                        <h3>Tasks</h3>
                        <button class="add-btn">+</button>
                    </div>

                    <ul class="task-list">
                        <!-- Tasks will be dynamically added here -->
                    </ul>
                </div>
            </div>

            <div id="column2">
                <div class="box top" id="tracker">
                    
                    <img class="animation freak-hide" src="image/freak_walk.gif" style="display: none;">
                    <img class="animation freak-run" src="image/freak_run.gif" style="display: block;" >
                    <img class="animation freak-crawl" src="image/freak_crawl.gif" style="display: none;" >
                    <img class="animation freak-relax" src="image/freak_relax.png" style="display: none;" >
                    <div class="progress-bar">
                        <div class="progression-bar default-progress-color"></div>
                    </div>
                </div>
                <div class="box bottom" id="events">
                    <div class="box-label">Events</div>

                    <div class="events-content">
                        <div class="events-add-btn">
                            <img src="image/add.svg" alt="Add Event">
                        </div>

                        <div class="events-cards-selection">
                            <div class="event-card event-card-urgent">
                                <div class="event-card-type">Upcoming • AI</div>
                                <div class="event-card-title">Meeting with Mike for Project Updates</div>
                                <div class="event-card-time urgent-text">
                                    Right Now! 
                                    <span class="event-bell"> 
                                        <img src="image/notifications-urgent.svg" alt="Notification">
                                    </span>
                                </div>
                            </div>

                            <div class="event-card">
                                <div class="event-card-type">Upcoming</div>
                                <div class="event-card-title">Call with Design Team</div>
                                <div class="event-card-time">
                                    3:00 pm 
                                    <span class="event-bell"> 
                                        <img src="image/notifications.svg" alt="Notification">
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Confirmation Modal -->
    <div class="confirmation-modal" id="confirmationModal">
        <div class="confirmation-content">
            <div class="confirmation-header">
                <h3>Confirm Delete</h3>
            </div>
            <div class="confirmation-body">
                <p id="confirmationMessage">Are you sure you want to delete this event?</p>
            </div>
            <div class="confirmation-actions">
                <button class="confirmation-btn confirmation-cancel" id="cancelBtn">Cancel</button>
                <button class="confirmation-btn confirmation-delete" id="confirmBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <div class="settings-header">
                <h3>Settings</h3>
                <button class="settings-close" id="settingsCloseBtn">
                    <img src="image/close.svg" alt="Close">
                </button>
            </div>
            
            <div class="settings-body">
                <div class="settings-section">
                    <label class="settings-label">Username</label>
                    <input type="text" class="settings-input" placeholder="Enter your name">
                </div>
                
                <div class="settings-section">
                    <label class="settings-label">Email</label>
                    <input type="email" class="settings-input" placeholder="your.email@example.com">
                </div>
                
                <div class="settings-section">
                    <label class="settings-label">Work Hours</label>
                    <input type="text" class="settings-input" placeholder="e.g., 9:00 AM - 5:00 PM">
                </div>
                
                <div class="settings-section">
                    <label class="settings-label">Display Mode</label>
                    <div class="settings-toggle">
                        <input type="checkbox" id="contrastModeToggle" class="toggle-checkbox">
                        <label for="contrastModeToggle" class="toggle-label">
                            <span class="toggle-text-default">Default</span>
                            <span class="toggle-switch"></span>
                            <span class="toggle-text-contrast">Contrast</span>
                        </label>
                    </div>
                </div>
                
                <div class="settings-section">
                    <label class="settings-checkbox">
                        <input type="checkbox" checked>
                        <span>Enable Notifications</span>
                    </label>
                </div>
            </div>
            
            <div class="settings-actions">
                <button class="settings-btn settings-cancel" id="settingsCancelBtn">Close</button>
                <button class="settings-btn settings-save">Save Changes</button>
            </div>
        </div>
    </div>
</body>
</html>
