<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="CSS/main.css">
        <link rel="stylesheet" href="CSS/events.css">
        <link rel="stylesheet" href="CSS/sidebar.css">
    </head>
    <body>
    <header class="header">
        <div class="header-left">
            <div class="header-title">Flow Dash</div>
            <div class="header-subtitle">Hello, <span id="name">Brian</span></div>
        </div>
    </header>

    <div class="main">
        <aside class="sidebar">
            <div class="nav-app">home</div>
            <div class="nav-app"></div>
            <div class="nav-app"></div>
            <div class="nav-app"></div>
        </aside>

        <main class="dashboard">
            <div id="column1">
                <div class="box top" id="main-display">main-display</div>
                <div class="box bottom" id="task">
                    task
                </div>
            </div>

            <div id="column2">
                <div class="box top" id="tracker">tracker</div>
                <div class="box bottom" id="events">
                    <div class="events-wrapper">
                        <div class="events-label">Events</div>

                        <div class="events-content">
                            <div class="events-add-btn">+</div>

                            <div class="event-card event-card-urgent">
                                <div class="event-card-type">Upcoming • AI</div>
                                <div class="event-card-title">Meeting with Mike for Project Updates</div>
                                <div class="event-card-time urgent-text">Right Now! 🔔</div>
                            </div>

                            <div class="event-card">
                                <div class="event-card-type">Upcoming</div>
                                <div class="event-card-title">Call with Design Team</div>
                                <div class="event-card-time">3:00 pm 🔔</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
