<!-- Add Task Modal (for overlay) -->
<div id="addTaskModal" class="modal">
    <div class="modal-content">
        <label for="taskTitleInput">Task Title</label>
        <input id="taskTitleInput" type="text" placeholder="Enter task title..." />
        <div class="modal-actions">
            <button id="cancelAddTask">Cancel</button>
            <button id="confirmAddTask">Add Task</button>
        </div>
    </div>
</div>
