<!-- Breathe Modal Overlay -->
<div id="breatheModal" class="breathe-modal">
    <div class="breathe-modal-content">
        <button id="closeBreatheModal" class="breathe-close-btn">×</button>
        <div class="breathe-box">
            <img src="../image/breathe.svg" alt="Breathe Box" class="breathe-svg" />
            <div class="breathe-label" id="breatheLabel">Inhale</div>
        </div>
        <div class="breathe-countdown-box">
            <span id="breatheCountdown">4</span>
        </div>
    </div>
</div>
